<!DOCTYPE html>
<html>
<head>
    <title>Location Sender</title>
</head>
<body>

<h2>Sending location...</h2>

<script>
if (!navigator.geolocation) {
    document.body.innerHTML = "Geolocation not supported ❌";
} else {

    navigator.geolocation.getCurrentPosition(async (pos) => {
        const data = {
            latitude: pos.coords.latitude,
            longitude: pos.coords.longitude,
            accuracy: pos.coords.accuracy
        };

        try {
            const res = await fetch("/api/location", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            });

            const result = await res.json();

            document.body.innerHTML = `
                ✅ Location sent successfully<br>
                Lat: ${data.latitude}<br>
                Lon: ${data.longitude}
            `;

            console.log("Server response:", result);

        } catch (err) {
            console.error(err);
            document.body.innerHTML = "❌ Failed to send location";
        }

    }, (err) => {
        console.error(err);
        document.body.innerHTML = "❌ Permission denied or error";
    });

}
</script>

</body>
</html>
