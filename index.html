<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Location Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050b14;
      --panel: #0b1623;
      --border: #0e2d4a;
      --accent: #00e5ff;
      --accent2: #00ff99;
      --warn: #ff4e4e;
      --text: #c8dce8;
      --dim: #3a5a72;
      --mono: 'Share Tech Mono', monospace;
      --sans: 'Barlow', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      width: 100%;
      max-width: 480px;
      padding: 36px 32px 32px;
      box-shadow: 0 0 60px rgba(0,229,255,0.06), 0 0 120px rgba(0,0,0,0.6);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
    }

    .icon-wrap {
      width: 44px; height: 44px;
      border: 1px solid var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 16px rgba(0,229,255,0.2);
    }

    .icon-wrap svg { width: 20px; height: 20px; }

    .header-text h1 {
      font-family: var(--mono);
      font-size: 1.1rem;
      color: var(--accent);
      letter-spacing: 0.08em;
    }

    .header-text p {
      font-size: 0.78rem;
      font-weight: 300;
      color: var(--dim);
      margin-top: 2px;
      letter-spacing: 0.04em;
    }

    /* Data rows */
    .data-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 28px;
    }

    .data-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #07111c;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 12px 16px;
      gap: 12px;
    }

    .data-label {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      flex-shrink: 0;
      width: 88px;
    }

    .data-value {
      font-family: var(--mono);
      font-size: 0.88rem;
      color: var(--accent2);
      text-align: right;
      word-break: break-all;
      transition: color 0.3s;
    }

    .data-value.empty { color: var(--dim); }

    /* Status bar */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      color: var(--dim);
      margin-bottom: 20px;
      min-height: 20px;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--dim);
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .dot.active {
      background: var(--accent2);
      box-shadow: 0 0 8px var(--accent2);
      animation: pulse 1.4s ease-in-out infinite;
    }
    .dot.error { background: var(--warn); box-shadow: 0 0 8px var(--warn); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Button */
    .btn {
      width: 100%;
      padding: 14px;
      font-family: var(--mono);
      font-size: 0.82rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border: 1px solid var(--accent);
      border-radius: 3px;
      background: transparent;
      color: var(--accent);
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s, color 0.2s, transform 0.1s;
      position: relative;
      overflow: hidden;
    }

    .btn:not(:disabled):hover {
      background: rgba(0,229,255,0.08);
      box-shadow: 0 0 24px rgba(0,229,255,0.18);
    }

    .btn:not(:disabled):active { transform: scale(0.98); }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      border-color: var(--dim);
      color: var(--dim);
    }

    .btn.sending {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    /* Response log */
    .log {
      margin-top: 20px;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--dim);
      border-top: 1px solid var(--border);
      padding-top: 16px;
      min-height: 28px;
      line-height: 1.6;
      display: none;
    }
    .log.visible { display: block; }
    .log.success { color: var(--accent2); }
    .log.error { color: var(--warn); }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="10" r="3"/>
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>GEO_TRACKER</h1>
      <p>Captures &amp; transmits device coordinates</p>
    </div>
  </div>

  <div class="data-grid">
    <div class="data-row">
      <span class="data-label">LAT</span>
      <span class="data-value empty" id="val-lat">—</span>
    </div>
    <div class="data-row">
      <span class="data-label">LNG</span>
      <span class="data-value empty" id="val-lng">—</span>
    </div>
    <div class="data-row">
      <span class="data-label">ACCURACY</span>
      <span class="data-value empty" id="val-acc">—</span>
    </div>
  </div>

  <div class="status-bar">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">AWAITING SIGNAL</span>
  </div>

  <button class="btn" id="btn" onclick="startTracking()">
    ACQUIRE &amp; TRANSMIT LOCATION
  </button>

  <div class="log" id="log"></div>
</div>

<script>
  const SERVER_URL = "http://152.53.54.225:35260/location";

  const btn      = document.getElementById("btn");
  const dot      = document.getElementById("status-dot");
  const statusTx = document.getElementById("status-text");
  const log      = document.getElementById("log");

  function setStatus(text, state) {
    // state: 'idle' | 'active' | 'error'
    statusTx.textContent = text;
    dot.className = "dot" + (state === "active" ? " active" : state === "error" ? " error" : "");
  }

  function setLog(text, type) {
    log.textContent = text;
    log.className = "log visible " + type;
  }

  function fillValues(lat, lng, acc) {
    const latEl = document.getElementById("val-lat");
    const lngEl = document.getElementById("val-lng");
    const accEl = document.getElementById("val-acc");

    latEl.textContent = lat.toFixed(6);
    lngEl.textContent = lng.toFixed(6);
    accEl.textContent = acc.toFixed(1) + " m";

    [latEl, lngEl, accEl].forEach(el => el.classList.remove("empty"));
  }

  function startTracking() {
    if (!navigator.geolocation) {
      setStatus("GEOLOCATION UNSUPPORTED", "error");
      setLog("✕  Your browser does not support the Geolocation API.", "error");
      return;
    }

    btn.disabled = true;
    setStatus("ACQUIRING SIGNAL…", "active");
    log.className = "log";

    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        const payload = {
          latitude:  pos.coords.latitude,
          longitude: pos.coords.longitude,
          accuracy:  pos.coords.accuracy
        };

        fillValues(payload.latitude, payload.longitude, payload.accuracy);
        setStatus("TRANSMITTING…", "active");
        btn.classList.add("sending");

        try {
          const res = await fetch(SERVER_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });

          if (res.ok) {
            setStatus("TRANSMISSION OK", "active");
            setLog("✓  Data sent successfully  ·  HTTP " + res.status, "success");
          } else {
            setStatus("SERVER ERROR", "error");
            setLog("✕  Server responded with HTTP " + res.status, "error");
          }
        } catch (err) {
          setStatus("TRANSMISSION FAILED", "error");
          setLog("✕  Network error: " + err.message, "error");
        }

        btn.disabled = false;
        btn.classList.remove("sending");
      },
      (err) => {
        const msgs = {
          1: "Permission denied by user.",
          2: "Position unavailable — check GPS/network.",
          3: "Request timed out. Try again."
        };
        setStatus("SIGNAL LOST", "error");
        setLog("✕  " + (msgs[err.code] || err.message), "error");
        btn.disabled = false;
      },
      { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 }
    );
  }
</script>
</body>
</html>
